<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Vivid Fluidity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0b0b0b; --fg: #ede8e1; --accent: #c9a87c; --accent2: #e07a5f;
            --muted: #7a7672; --border: rgba(255,255,255,0.08);
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Outfit', sans-serif;
        }
        html { scroll-behavior: smooth; }
        body { font-family: var(--sans); background: var(--bg); color: var(--fg); line-height: 1.6; overflow-x: hidden; }
        a { color: inherit; text-decoration: none; }

        /* NAV */
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.4rem 2.5rem; display: flex; justify-content: space-between; align-items: center; background: rgba(11,11,11,0.7); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
        .logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 300; letter-spacing: 0.06em; font-style: italic; }
        .nav-links { display: flex; gap: 2.2rem; align-items: center; }
        .nav-links a { font-size: 0.78rem; font-weight: 400; letter-spacing: 0.14em; color: var(--muted); transition: color 0.3s; text-transform: uppercase; }
        .nav-links a:hover, .nav-links a.active { color: var(--fg); }
        .nav-social { display: flex; gap: 1.2rem; margin-left: 1rem; }
        .nav-social a { color: var(--muted); transition: color 0.3s; }
        .nav-social a:hover { color: var(--accent); }
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; }
        .hamburger span { width: 22px; height: 1.5px; background: var(--fg); }

        /* CONTACT LAYOUT */
        .contact-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            padding-top: 4rem;
        }

        .contact-form-side {
            padding: 6rem 4rem 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-form-side h1 {
            font-family: var(--serif);
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 300;
            font-style: italic;
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-family: var(--serif);
            font-size: 1rem;
            font-style: italic;
            color: var(--fg);
            margin-bottom: 0.4rem;
        }

        .form-group .required {
            font-size: 0.75rem;
            color: var(--muted);
            font-style: normal;
            font-family: var(--sans);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--fg);
            font-family: var(--sans);
            font-size: 0.95rem;
            font-weight: 300;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-bottom-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .phone-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 1rem;
        }

        .form-group select {
            cursor: pointer;
        }

        .form-group select option {
            background: var(--bg);
            color: var(--fg);
        }

        .submit-btn {
            display: inline-block;
            padding: 0.9rem 2.5rem;
            background: rgba(201,168,124,0.15);
            border: 1px solid rgba(201,168,124,0.3);
            color: var(--accent);
            font-family: var(--serif);
            font-size: 1.1rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: rgba(201,168,124,0.25);
            border-color: var(--accent);
        }

        .contact-image-side {
            position: relative;
            overflow: hidden;
        }

        .contact-image-side img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* FOOTER */
        footer { padding: 3.5rem 2rem; text-align: center; border-top: 1px solid var(--border); }
        footer a.email { font-family: var(--serif); font-size: 1.2rem; font-style: italic; color: var(--accent); text-decoration: underline; text-underline-offset: 4px; }
        footer .copy { color: var(--muted); font-size: 0.8rem; margin-top: 1rem; font-weight: 300; }

        /* MOBILE */
        @media (max-width: 768px) {
            nav { padding: 1rem 1.5rem; }
            .nav-links, .nav-social { display: none; }
            .hamburger { display: flex; }
            .nav-links.active { display: flex; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: rgba(11,11,11,0.97); backdrop-filter: blur(24px); padding: 2rem; gap: 1.5rem; border-bottom: 1px solid var(--border); }
            .contact-layout { grid-template-columns: 1fr; }
            .contact-form-side { padding: 6rem 1.5rem 3rem; }
            .contact-image-side { height: 50vh; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Vivid Fluidity</a>
        <div class="nav-links" id="navLinks">
            <a href="photography.html">Photography</a>
            <a href="fire-performer.html">Fire Performer</a>
            <a href="fitness.html">Fitness</a>
            <a href="housesitting.html">HouseSitting</a>
            <a href="photobooth.html">Photobooth Rentals</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
        <div class="nav-social">
            <a href="https://www.linkedin.com/in/ashleyorianna" target="_blank" aria-label="LinkedIn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></a>
            <a href="https://www.instagram.com/vividfluidity" target="_blank" aria-label="Instagram"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg></a>
            <a href="https://www.facebook.com/vividfluidity" target="_blank" aria-label="Facebook"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
        </div>
        <div class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('active')"><span></span><span></span><span></span></div>
    </nav>

    <div class="contact-layout">
        <div class="contact-form-side">
            <h1>Say hello!</h1>
            <form action="https://formspree.io/f/Ashley@VividFluidity.com" method="POST">
                <div class="form-group">
                    <label>Name</label>
                    <div class="form-row">
                        <div>
                            <input type="text" name="first_name" placeholder="First Name" required>
                        </div>
                        <div>
                            <input type="text" name="last_name" placeholder="Last Name" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email <span class="required">(required)</span></label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <div class="phone-row">
                        <select name="country_code">
                            <option value="+1">United States</option>
                            <option value="+44">United Kingdom</option>
                            <option value="+45">Denmark</option>
                            <option value="+1441">Bermuda</option>
                        </select>
                        <input type="tel" name="phone" placeholder="+1">
                    </div>
                </div>
                <div class="form-group">
                    <label>Subject <span class="required">(required)</span></label>
                    <input type="text" name="subject" required>
                </div>
                <div class="form-group">
                    <label>Message <span class="required">(required)</span></label>
                    <textarea name="message" rows="4" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send</button>
            </form>
        </div>
        <div class="contact-image-side">
            <img src="https://images.squarespace-cdn.com/content/v1/5ff5118aa7a72a4f384902bb/ece97a6c-3a5d-4d82-9aaf-2f2527ee0c38/220508_PinkPhoneBooth_WEB.gif" alt="Ashley at phone booth">
        </div>
    </div>

    <footer>
        <a href="mailto:Ashley@VividFluidity.com" class="email">Ashley@VividFluidity.com</a>
        <p class="copy">&copy; 2024 Vivid Fluidity</p>
    </footer>

    <script>
        document.querySelectorAll('.nav-links a').forEach(a => {
            a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('active'));
        });
    </script>

</body>
</html>
